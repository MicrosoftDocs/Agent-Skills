# Azure Pipeline: Sync Microsoft Learn Docs to Agent Skills
#
# This pipeline:
# 1. Checks out GitHub repo (contains products/, skills/)
# 2. Checks out ADO repo (contains src/, config/)
# 3. Runs docs2skills to crawl and classify docs
# 4. Pushes results back to GitHub repo

trigger: none

schedules:
  - cron: "0 2 * * *"  # Daily at 2:00 AM UTC
    displayName: Run every day
    branches:
      include:
        - main
    always: true

variables:
  - name: pythonVersion
    value: '3.12'
  - name: azureOpenAIEndpoint
    value: 'https://your-resource.openai.azure.com'  # TODO: Update this

stages:
  - stage: __default
    jobs:
      - job: Job
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 60

        steps:
          # 1. Checkout GitHub repo (self - contains products/, skills/)
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            displayName: 'Checkout GitHub repo'
            inputs:
              repository: self
              persistCredentials: true

          # 2. Checkout ADO repo (source code)
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            displayName: 'Checkout ADO repo (code)'
            inputs:
              repository: git://Docs/Learn.Docs2AgentSkills@refs/heads/main  # TODO: Update project/repo

          # 3. Setup Python
          - task: UsePythonVersion@0
            displayName: 'Setup Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'

          # 4. Install dependencies
          - task: Bash@3
            displayName: 'Install dependencies'
            inputs:
              targetType: inline
              script: |
                cd $(Build.SourcesDirectory)/Learn.Docs2AgentSkills
                pip install --upgrade pip
                pip install -r requirements.txt

          # 5. Run docs2skills with Azure identity
          - task: AzureCLI@2
            displayName: 'Run docs2skills'
            inputs:
              azureSubscription: 'docs2skills-azure-connection'  # TODO: Update this
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(Build.SourcesDirectory)/Learn.Docs2AgentSkills

                echo "========================================"
                echo "Starting docs sync"
                echo "========================================"

                # Get the GitHub repo name (self checkout)
                GITHUB_REPO=$(basename $(Build.Repository.Uri) .git)
                echo "GitHub repo: $GITHUB_REPO"
                echo "Products dir: $(Build.SourcesDirectory)/$GITHUB_REPO/products"
                echo "Skills dir: $(Build.SourcesDirectory)/$GITHUB_REPO/skills"

                python -m src.docs2skills \
                  --products-dir $(Build.SourcesDirectory)/$GITHUB_REPO/products \
                  --skills-dir $(Build.SourcesDirectory)/$GITHUB_REPO/skills

                echo "Sync completed"
            env:
              AZURE_OPENAI_ENDPOINT: $(azureOpenAIEndpoint)

          # 6. Push to GitHub repo
          - task: Bash@3
            displayName: 'Push to GitHub'
            inputs:
              targetType: inline
              script: |
                GITHUB_REPO=$(basename $(Build.Repository.Uri) .git)
                cd $(Build.SourcesDirectory)/$GITHUB_REPO

                git config user.email "docs2skills-pipeline@microsoft.com"
                git config user.name "Docs2Skills Pipeline"

                CHANGED_FILES=$(git status --porcelain products/ skills/ | wc -l)

                if [ "$CHANGED_FILES" -gt 0 ]; then
                  echo "Changed files: $CHANGED_FILES"
                  git add products/ skills/

                  TIMESTAMP=$(date +"%Y-%m-%d %H:%M")
                  git commit -m "$TIMESTAMP - Sync docs [skip ci]"
                  git push origin HEAD:main

                  echo "Pushed changes to GitHub"
                else
                  echo "No changes detected"
                fi
